# from frontend/doctor-power: docker build -f Dockerfile.dev -t dp-frontend .
# from backend: docker build -f Dockerfile.dev -t dp-backend .
# from root: docker compose up --build


# Run full app: frontend (dev server) + backend API
# From repo root: docker compose up --build
# Frontend: http://localhost:5173  |  Backend API: http://localhost:5280

services:
  frontend:
    build:
      context: ./frontend/doctor-power
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/doctor-power:/app
      - /app/node_modules
    environment:
      - VITE_POWERDOCU_BACKEND_URL=http://localhost:5280
    stdin_open: true
    tty: true

  backend:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5280:5280"
    environment:
      #- ASPNETCORE_ENVIRONMENT=Development # Development, Testing, Production
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}

